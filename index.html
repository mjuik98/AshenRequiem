<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashen Requiem</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1117;
      font-family: 'Segoe UI', sans-serif;
    }
    #game-canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }
    #ui-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #ui-container button,
    #ui-container [id$="-btn"],
    #ui-container .levelup-card,
    #ui-container .result-restart-btn,
    #ui-container .title-start-btn {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-container"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
