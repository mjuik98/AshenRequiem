<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashen Requiem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #ui-container > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-container"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
