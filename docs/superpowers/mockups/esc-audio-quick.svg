<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1622"/>
      <stop offset="100%" stop-color="#0c0a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#efd594"/>
      <stop offset="100%" stop-color="#bd7d37"/>
    </linearGradient>
  </defs>
  <rect width="900" height="760" fill="#0b1016"/>
  <rect x="120" y="40" width="660" height="680" rx="28" fill="url(#bg)" stroke="rgba(212,175,106,0.35)"/>
  <text x="160" y="96" fill="#d7b46a" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Option A. 빠른 오디오 패널</text>
  <text x="160" y="126" fill="#c8c8c8" font-size="15" font-family="Segoe UI, Arial">ESC 모달 안에 오디오만 얇게 추가하는 형태</text>

  <g font-family="Segoe UI, Arial">
    <rect x="160" y="156" width="92" height="34" rx="17" fill="#2a241b" stroke="#83632c"/>
    <text x="188" y="178" fill="#e3c98a" font-size="14">사운드</text>
    <rect x="262" y="156" width="74" height="34" rx="17" fill="#191822" stroke="#2f3240"/>
    <text x="287" y="178" fill="#7f8496" font-size="14">무기</text>
    <rect x="346" y="156" width="86" height="34" rx="17" fill="#191822" stroke="#2f3240"/>
    <text x="372" y="178" fill="#7f8496" font-size="14">장신구</text>
    <rect x="442" y="156" width="78" height="34" rx="17" fill="#191822" stroke="#2f3240"/>
    <text x="470" y="178" fill="#7f8496" font-size="14">스탯</text>
  </g>

  <g font-family="Segoe UI, Arial">
    <text x="160" y="240" fill="#7e8088" font-size="12" letter-spacing="2">COMBAT AUDIO</text>

    <text x="160" y="286" fill="#ececec" font-size="17">마스터</text>
    <text x="690" y="286" fill="#ececec" font-size="17" text-anchor="end">78</text>
    <rect x="160" y="302" width="530" height="10" rx="5" fill="#2b2a34"/>
    <rect x="160" y="302" width="413" height="10" rx="5" fill="url(#gold)"/>

    <text x="160" y="360" fill="#ececec" font-size="17">BGM</text>
    <text x="690" y="360" fill="#ececec" font-size="17" text-anchor="end">52</text>
    <rect x="160" y="376" width="530" height="10" rx="5" fill="#2b2a34"/>
    <rect x="160" y="376" width="276" height="10" rx="5" fill="url(#gold)"/>

    <text x="160" y="434" fill="#ececec" font-size="17">SFX</text>
    <text x="690" y="434" fill="#ececec" font-size="17" text-anchor="end">64</text>
    <rect x="160" y="450" width="530" height="10" rx="5" fill="#2b2a34"/>
    <rect x="160" y="450" width="339" height="10" rx="5" fill="url(#gold)"/>

    <rect x="160" y="500" width="530" height="56" rx="14" fill="#1b1b24" stroke="#2c2f39"/>
    <text x="184" y="535" fill="#ececec" font-size="16">배경음악</text>
    <rect x="624" y="516" width="50" height="24" rx="12" fill="#27452f" stroke="#427651"/>
    <circle cx="660" cy="528" r="10" fill="#8dd39a"/>

    <rect x="160" y="570" width="530" height="56" rx="14" fill="#1b1b24" stroke="#2c2f39"/>
    <text x="184" y="605" fill="#ececec" font-size="16">효과음</text>
    <rect x="624" y="586" width="50" height="24" rx="12" fill="#27452f" stroke="#427651"/>
    <circle cx="660" cy="598" r="10" fill="#8dd39a"/>
  </g>

  <g font-family="Segoe UI, Arial">
    <rect x="160" y="650" width="170" height="42" rx="12" fill="#1b1b24" stroke="#343745"/>
    <text x="245" y="676" fill="#bfc3cf" font-size="15" text-anchor="middle">전투 포기</text>
    <rect x="344" y="650" width="346" height="42" rx="12" fill="#2b2418" stroke="#8f6b33"/>
    <text x="517" y="676" fill="#e5c985" font-size="15" text-anchor="middle">재개</text>
  </g>

  <g font-family="Segoe UI, Arial">
    <text x="728" y="266" fill="#e2c889" font-size="15" font-weight="700">핵심</text>
    <text x="728" y="294" fill="#cfd2da" font-size="13">전투 중 볼륨만 빠르게 조절</text>
    <text x="728" y="340" fill="#e2c889" font-size="15" font-weight="700">장점</text>
    <text x="728" y="368" fill="#cfd2da" font-size="13">정보 밀도 낮음</text>
    <text x="728" y="392" fill="#cfd2da" font-size="13">기존 ESC 흐름 유지</text>
    <text x="728" y="438" fill="#e2c889" font-size="15" font-weight="700">단점</text>
    <text x="728" y="466" fill="#cfd2da" font-size="13">전체 설정 대체는 어려움</text>
  </g>
